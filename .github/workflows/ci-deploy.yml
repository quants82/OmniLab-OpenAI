name: CI and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ominilab-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate backend and frontend
    runs-on: ubuntu-latest
    env:
      APP_SECRET: ci-only-secret
      DATABASE_PATH: /tmp/ominilab-ci.db
      DEMO_USERNAME: judge
      DEMO_PASSWORD: ominilab-demo

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend_Ominilab/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend_Ominilab/requirements.txt

      - name: Check backend syntax
        run: >-
          python -m compileall -q
          backend_Ominilab/main.py
          backend_Ominilab/config.py
          backend_Ominilab/database.py
          backend_Ominilab/dependencies.py
          backend_Ominilab/security.py
          backend_Ominilab/routers

      - name: Run backend smoke tests
        working-directory: backend_Ominilab
        run: python -m pytest -q tests

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20.19.6"
          cache: npm
          cache-dependency-path: frontend_Ominilab/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend_Ominilab
        run: npm ci

      - name: Build frontend
        working-directory: frontend_Ominilab
        env:
          PUBLIC_API_URL: https://ominilab.vatli365.vn
          PUBLIC_SITE_URL: https://ominilab.vatli365.vn
        run: npm run build

  deploy:
    name: Deploy production
    needs: validate
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Configure deployment SSH key
        env:
          SSH_PRIVATE_KEY_MATERIAL: ${{ secrets.OMINILAB_SSH_PRIVATE_KEY_B64 }}
        run: |
          install -m 0700 -d ~/.ssh

          if [[ -z "$SSH_PRIVATE_KEY_MATERIAL" ]]; then
            echo "::error::OMINILAB_SSH_PRIVATE_KEY_B64 is missing or empty."
            exit 1
          fi

          if [[ "$SSH_PRIVATE_KEY_MATERIAL" == *"BEGIN OPENSSH PRIVATE KEY"* ]]; then
            printf '%s\n' "$SSH_PRIVATE_KEY_MATERIAL" |
              tr -d '\r' > ~/.ssh/ominilab_deploy
          else
            printf '%s' "$SSH_PRIVATE_KEY_MATERIAL" |
              tr -d '[:space:]' |
              base64 --decode > ~/.ssh/ominilab_deploy
          fi

          chmod 0600 ~/.ssh/ominilab_deploy
          ssh-keygen -y -f ~/.ssh/ominilab_deploy > /dev/null
          printf '%s\n' \
            'ominilab.vatli365.vn ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDbxXeOyNZ+FVlN8nQ5bVqB7uQsfCDBwnz+NDvAMBwCG' \
            > ~/.ssh/known_hosts
          chmod 0600 ~/.ssh/known_hosts

      - name: Deploy Ominilab
        run: >-
          ssh
          -i ~/.ssh/ominilab_deploy
          -o IdentitiesOnly=yes
          -o StrictHostKeyChecking=yes
          ominilab-deploy@ominilab.vatli365.vn
          'sudo -n /usr/local/sbin/deploy-ominilab'

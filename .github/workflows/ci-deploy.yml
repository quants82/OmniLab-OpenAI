name: CI and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: omnilab-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate backend and frontend
    runs-on: ubuntu-latest
    env:
      APP_SECRET: ci-only-secret
      DATABASE_PATH: /tmp/omnilab-ci.db
      DEMO_USERNAME: judge
      DEMO_PASSWORD: omnilab-demo

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend_OmiLab/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend_OmiLab/requirements.txt

      - name: Check backend syntax
        run: >-
          python -m compileall -q
          backend_OmiLab/main.py
          backend_OmiLab/config.py
          backend_OmiLab/database.py
          backend_OmiLab/dependencies.py
          backend_OmiLab/security.py
          backend_OmiLab/routers

      - name: Run backend smoke tests
        working-directory: backend_OmiLab
        run: python -m pytest -q tests

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20.19.6"
          cache: npm
          cache-dependency-path: frontend_OmiLb/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend_OmiLb
        run: npm ci

      - name: Build frontend
        working-directory: frontend_OmiLb
        env:
          PUBLIC_API_URL: https://ominilab.vatli365.vn
          PUBLIC_SITE_URL: https://ominilab.vatli365.vn
        run: npm run build

  deploy:
    name: Deploy production
    needs: validate
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Configure deployment SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.OMNILAB_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.OMNILAB_SSH_KNOWN_HOSTS }}
        run: |
          install -m 0700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/ominilab_deploy
          chmod 0600 ~/.ssh/ominilab_deploy
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 0600 ~/.ssh/known_hosts

      - name: Deploy OmniLab
        run: >-
          ssh
          -i ~/.ssh/ominilab_deploy
          -o IdentitiesOnly=yes
          -o StrictHostKeyChecking=yes
          ominilab-deploy@ominilab.vatli365.vn
          'sudo -n /usr/local/sbin/deploy-ominilab'
